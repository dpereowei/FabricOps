{{- if .Values.rbac.helpers.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "fabricops.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "fabricops.resourceName" (dict "suffix" "fabricparticipant-viewer-role" "context" $) }}
rules:
- apiGroups:
  - fabricops.io
  resources:
  - fabricparticipants
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - fabricops.io
  resources:
  - fabricparticipants/status
  verbs:
  - get
{{- end }}
