apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fabricnetworks.fabricops.io
spec:
  group: fabricops.io
  names:
    kind: FabricNetwork
    plural: fabricnetworks
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                orgName:
                  type: string
                domain:
                  type: string
                orderer:
                  type: object
                  properties:
                    replicas:
                      type: integer
                peer:
                  type: object
                  properties:
                    replicas:
                      type: integer
                ca:
                  type: object
                  properties:
                    enabled:
                      type: boolean