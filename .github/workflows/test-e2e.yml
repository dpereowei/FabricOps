name: E2E Tests

on:
  push:
  pull_request:

permissions: {}

jobs:
  test-e2e:
    permissions:
      contents: read
    name: Bundle smoke on kind (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - node
          - go
          - java
    env:
      E2E_CHAINCODE_RUNTIME: ${{ matrix.runtime }}
      E2E_SAMPLE_MANIFEST: config/samples/e2e/${{ matrix.runtime }}/fabricnetwork.yaml
      KIND_CLUSTER: fabricops-ci-e2e-${{ matrix.runtime }}
      KIND_VERSION: v0.31.0
      IMG: controller:latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Run kind bundle e2e smoke
        run: |
          make test-e2e

      - name: Cleanup kind cluster
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER}" || true
