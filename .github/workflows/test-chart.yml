name: Test Chart

on:
  push:
  pull_request:

permissions: {}

jobs:
  test-chart:
    permissions:
      contents: read
    name: Helm smoke on kind
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      IMG: controller:latest
      KIND_CLUSTER: fabricops-ci-helm
      KIND_VERSION: v0.31.0
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Create kind cluster
        run: kind create cluster --name "${KIND_CLUSTER}"

      - name: Prepare fabricops
        run: |
          make docker-build
          make build-fabricopsctl
          kind load docker-image "${IMG}" --name "${KIND_CLUSTER}"
          node_image="$(awk '$1 == "image:" && $2 ~ /fabricops-node-settlement/ { print $2; exit }' config/samples/fabricops_v1alpha1_fabricnetwork.yaml)"
          test -n "${node_image}"
          docker build -t "${node_image}" config/samples/chaincodes/node_settlement
          kind load docker-image "${node_image}" --name "${KIND_CLUSTER}"

      - name: Install Helm
        run: make install-helm

      - name: Lint Helm Chart
        run: |
          helm lint ./dist/chart

# TODO: Uncomment if cert-manager is enabled
#      - name: Install cert-manager via Helm (wait for readiness)
#        run: |
#          helm repo add jetstack https://charts.jetstack.io
#          helm repo update
#          helm install cert-manager jetstack/cert-manager \
#            --namespace cert-manager \
#            --create-namespace \
#            --set crds.enabled=true \
#            --wait \
#            --timeout 300s

# TODO: Uncomment if Prometheus is enabled
#      - name: Install Prometheus Operator CRDs
#        run: |
#          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#          helm repo update
#          helm install prometheus-crds prometheus-community/prometheus-operator-crds

      - name: Deploy manager via Helm
        run: |
          make helm-deploy

      - name: Check Helm release status
        run: |
          make helm-status

      - name: Apply sample network
        run: |
          kubectl apply -k config/samples
          bin/fabricopsctl wait -n default --timeout 20m fabricnetwork-sample

      - name: Invoke and query with fabricopsctl
        run: |
          settlement_id="chart-$(date +%s)"
          bin/fabricopsctl invoke -n default \
            --org BankA \
            --peer BankA/peer0 \
            --peer BankB/peer0 \
            --channel settlement \
            --chaincode settlement \
            --function createSettlement \
            --args "[\"${settlement_id}\",\"alice\",\"bob\",\"100\",\"USD\"]" \
            -o json \
            fabricnetwork-sample
          bin/fabricopsctl query -n default \
            --org BankA \
            --peer BankA/peer0 \
            --channel settlement \
            --chaincode settlement \
            --function readSettlement \
            --args "[\"${settlement_id}\"]" \
            -o json \
            fabricnetwork-sample

      - name: Cleanup kind cluster
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER}" || true
